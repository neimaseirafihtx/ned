    sources:
      - references/home-assistant-automation-inventory.md
      - plans/home-assistant-usability-pass.md
    tags: [automations, smart-home, migration]

  - id: home-assistant-boot-reliability
    order: 210
    track: infrastructure
    phase: 4
    status: planned
    title: Home Assistant boot/reachability reliability
    summary: Make HAOS/UTM startup and homeassistant.local / 192.168.68.68 reachability reliable after reboots and bridge changes.
