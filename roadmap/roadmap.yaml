    completed_at: null
    next_action: Keep conditional; do not buy/build until trigger criteria are met.
    dependencies: [camera-frigate-nvr]
    sources:
      - memory/project_homelab_roadmap.md
    tags: [gpu, conditional, hardware]

  - id: nextcloud-personal-storage
    order: 250
    track: infrastructure
    phase: 4
    status: planned
    title: Samsung T9 personal storage / future Nextcloud lane
    summary: Use the Samsung T9 external SSD as Mac mini NAS-style storage, agent workspace, and possible future Nextcloud data drive.
    rationale: Near-term storage should support personal files and agents, not deferred NVR/camera storage.
    completed_at: null
    next_action: Define mount/backup conventions before installing persistent services on it.
