    dependencies: [mac-mini-reboot-baseline]
    sources:
      - memory/session-log.md
      - memory/project_homelab_roadmap.md
    tags: [home-assistant, utm, network]

  - id: local-intelligence-layer
    order: 220
    track: local-sovereignty
    phase: 4
    status: planned
