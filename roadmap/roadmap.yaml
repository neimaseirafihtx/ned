  - id: camera-frigate-nvr
    order: 230
    track: future-expansion
    phase: 4
    status: deferred
    title: Camera / Frigate / NVR path
    summary: Local camera/NVR work is intentionally postponed; Nest cameras/thermostats remain deferred for now.
    rationale: Camera/NVR migration is a rabbit hole and does not teach the core agent loop as directly as HA+MCP.
    completed_at: null
    next_action: Do not plan storage or GPU around cameras until Neima explicitly reopens this project.
