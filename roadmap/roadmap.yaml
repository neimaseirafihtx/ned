    dependencies: [hybrid-ai-provider-lane]
    sources:
      - memory/project_homelab_roadmap.md
    tags: [ollama, llama-cpp, local-models]

  - id: friend-hermes-docker-pilot
    order: 170
    track: friend-hermes
    phase: 5
    status: active
