      - memory/project_homelab_roadmap.md
    tags: [storage, samsung-t9, nextcloud]

  - id: ai-mastery-sovereignty
    order: 260
    track: local-sovereignty
    phase: 7
    status: planned
    title: Mastery + sovereignty
    summary: Long-term hybrid cloud/local stack with fully local components where quality, context, latency, and reliability make sense.
    rationale: AI mastery is the primary goal; sovereignty grows from proven workflows, not ideology.
    completed_at: null
    next_action: Accumulate lessons from MCP, cron, friend Hermes, local workers, and HA automation work.
    dependencies: [hybrid-ai-provider-lane, local-intelligence-layer]
    sources:
      - memory/project_homelab_roadmap.md
    tags: [ai-mastery, sovereignty, long-term]
