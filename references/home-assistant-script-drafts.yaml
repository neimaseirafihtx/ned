# Home Assistant script drafts for first usability pass.
# Source of truth: references/home-assistant-automation-inventory.md
# Applied in HA on 2026-06-01 as:
#   - scene.family_room_evening
#   - scene.family_room_movie
#   - script.family_room_evening
#   - script.family_room_movie

family_room_evening:
  alias: Family Room Evening
  description: Exact HA translation of Apple Home Evening scene across Kitchen, Family Room, and Dining Room.
  icon: mdi:sofa
  mode: single
  sequence:
    - action: light.turn_on
      target:
        entity_id: light.kitchen_island_pendants
      data:
        brightness_pct: 30
    - action: light.turn_off
      target:
        entity_id: light.kitchen_main_lights
    - action: light.turn_on
      target:
        entity_id: light.tv_lightstrip
      data:
        brightness_pct: 28
    - action: light.turn_on
      target:
        entity_id: light.family_room_lamp
      data:
        brightness_pct: 75
    - action: light.turn_on
      target:
        entity_id: light.family_room_main_lights
      data:
        brightness_pct: 1
    - action: light.turn_on
      target:
        entity_id: light.dining_room_main_lights
      data:
        brightness_pct: 20

family_room_movie:
  alias: Family Room Movie
  description: Exact HA translation of Apple Home Movie scene across Kitchen, Family Room, and Dining Room.
  icon: mdi:movie-open
  mode: single
  sequence:
    - action: light.turn_on
      target:
        entity_id: light.kitchen_island_pendants
      data:
        brightness_pct: 35
    - action: light.turn_on
      target:
        entity_id: light.tv_lightstrip
      data:
        brightness_pct: 19
    - action: light.turn_on
      target:
        entity_id: light.family_room_lamp
      data:
        brightness_pct: 25
    - action: light.turn_off
      target:
        entity_id: light.family_room_main_lights
    - action: light.turn_off
      target:
        entity_id: light.dining_room_main_lights
