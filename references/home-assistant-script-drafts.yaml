# Home Assistant scene/script drafts for first usability pass.
# Source of truth: references/home-assistant-automation-inventory.md
# Applied in HA on 2026-06-01 as:
#   - scene.family_room_evening
#   - scene.family_room_movie
#   - script.family_room_evening
#   - script.family_room_movie
#
# Pitfall discovered 2026-06-01:
# HA scene config entities need flattened attributes, e.g.:
#   light.example:
#     state: "on"
#     brightness: 128
# Do NOT use REST state shape with nested attributes:
#   light.example:
#     state: "on"
#     attributes:
#       brightness: 128

scenes:
  family_room_evening:
    name: Family Room Evening
    icon: mdi:sofa
    entities:
      light.kitchen_island_pendants:
        state: "on"
        brightness: 76
      light.kitchen_main_lights:
        state: "off"
      light.tv_lightstrip:
        state: "on"
        brightness: 71
      light.family_room_lamp:
        state: "on"
        brightness: 191
      light.family_room_main_lights:
        state: "on"
        brightness: 3
      light.dining_room_main_lights:
        state: "on"
        brightness: 51
    metadata: {}

  family_room_movie:
    name: Family Room Movie
    icon: mdi:movie-open
    entities:
      light.kitchen_island_pendants:
        state: "on"
        brightness: 89
      light.tv_lightstrip:
        state: "on"
        brightness: 48
      light.family_room_lamp:
        state: "on"
        brightness: 64
      light.family_room_main_lights:
        state: "off"
      light.dining_room_main_lights:
        state: "off"
    metadata: {}

scripts:
  family_room_evening:
    alias: Family Room Evening
    description: Exact HA translation of Apple Home Evening scene across Kitchen, Family Room, and Dining Room. Uses direct light service calls.
    icon: mdi:sofa
    mode: single
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.kitchen_island_pendants
        data:
          brightness_pct: 30
      - service: light.turn_off
        target:
          entity_id: light.kitchen_main_lights
      - service: light.turn_on
        target:
          entity_id: light.tv_lightstrip
        data:
          brightness_pct: 28
      - service: light.turn_on
        target:
          entity_id: light.family_room_lamp
        data:
          brightness_pct: 75
      - service: light.turn_on
        target:
          entity_id: light.family_room_main_lights
        data:
          brightness_pct: 1
      - service: light.turn_on
        target:
          entity_id: light.dining_room_main_lights
        data:
          brightness_pct: 20

  family_room_movie:
    alias: Family Room Movie
    description: Exact HA translation of Apple Home Movie scene across Kitchen, Family Room, and Dining Room. Uses direct light service calls.
    icon: mdi:movie-open
    mode: single
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.kitchen_island_pendants
        data:
          brightness_pct: 35
      - service: light.turn_on
        target:
          entity_id: light.tv_lightstrip
        data:
          brightness_pct: 19
      - service: light.turn_on
        target:
          entity_id: light.family_room_lamp
        data:
          brightness_pct: 25
      - service: light.turn_off
        target:
          entity_id: light.family_room_main_lights
      - service: light.turn_off
        target:
          entity_id: light.dining_room_main_lights
